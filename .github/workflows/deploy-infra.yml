name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
        default: dev
      location:
        description: "Azure region"
        required: false
        type: string
        default: northcentralus

permissions:
  id-token: write
  contents: read

env:
  BICEP_DIR: infra

jobs:
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep templates
        run: az bicep build --file ${{ env.BICEP_DIR }}/main.bicep

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
      LOCATION: ${{ github.event.inputs.location || 'northcentralus' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Determine resource group
        id: rg
        run: |
          RG_NAME="stocksentiment-${ENVIRONMENT}-rg"
          echo "name=${RG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create resource group
        run: |
          az group create \
            --name "${{ steps.rg.outputs.name }}" \
            --location "${{ env.LOCATION }}" \
            --tags project=stock-sentiment-analysis environment="${{ env.ENVIRONMENT }}" managedBy=github-actions

      - name: Deploy infrastructure
        id: deploy
        run: |
          az deployment group create \
            --resource-group "${{ steps.rg.outputs.name }}" \
            --template-file "${{ env.BICEP_DIR }}/main.bicep" \
            --parameters "${{ env.BICEP_DIR }}/parameters/${{ env.ENVIRONMENT }}.bicepparam" \
            --parameters location="${{ env.LOCATION }}" \
            --name "infra-$(date +%Y%m%d%H%M%S)" \
            --query "properties.outputs" \
            --output json > deployment-outputs.json

      - name: Show deployment outputs
        run: cat deployment-outputs.json

      - name: Upload deployment outputs
        uses: actions/upload-artifact@v4
        with:
          name: deployment-outputs-${{ env.ENVIRONMENT }}
          path: deployment-outputs.json
          retention-days: 30
